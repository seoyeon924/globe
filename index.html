<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>GLOBAL MIGRATION</title>
  <script src="https://unpkg.com/globe.gl@2.27.0/dist/globe.gl.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#fff;overflow:hidden}
    #globe{width:100vw;height:100vh;filter:brightness(1.1) contrast(1.1)}
    #ui{position:fixed;top:0;left:0;padding:20px;pointer-events:none;z-index:10;font-family:system-ui,sans-serif}
    .tag{font-size:9px;letter-spacing:.2em;color:#ff2060;text-transform:uppercase;margin-bottom:6px;text-shadow:0 0 20px #ff2060}
    h1{font-size:20px;font-weight:700;color:#fff;text-shadow:0 0 30px rgba(255,100,150,0.8)}
    .sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:4px}
  </style>
</head>
<body>
<div id="globe"></div>
<div id="ui">
  <div class="tag">Migration Flow 2024</div>
  <h1>GLOBAL MIGRATION</h1>
  <div class="sub">Density: Red → White</div>
</div>
<script>
var hubs = [
  {lat:35.0,lng:38.0},  // Syria
  {lat:10.5,lng:-66.9}, // Venezuela
  {lat:34.5,lng:69.2},  // Afghanistan
  {lat:50.4,lng:30.5},  // Ukraine
  {lat:15.5,lng:32.5},  // Sudan
  {lat:12.0,lng:-1.5},  // Burkina Faso
  {lat:16.0,lng:96.0},  // Myanmar
];

// Generate destinations (reduced)
var destinations = [];
// Europe
for(var i=0;i<15;i++) destinations.push({lat:45+Math.random()*18,lng:-5+Math.random()*35});
// Middle East
for(var i=0;i<8;i++) destinations.push({lat:28+Math.random()*12,lng:35+Math.random()*20});
// Americas
for(var i=0;i<10;i++) destinations.push({lat:-20+Math.random()*60,lng:-100+Math.random()*50});
// Asia Pacific
for(var i=0;i<6;i++) destinations.push({lat:-30+Math.random()*50,lng:110+Math.random()*60});
// Africa
for(var i=0;i<8;i++) destinations.push({lat:-20+Math.random()*40,lng:0+Math.random()*40});

// Generate arcs (~200)
var arcs = [];
hubs.forEach(function(hub) {
  destinations.forEach(function(dest) {
    var dist = Math.sqrt(Math.pow(hub.lat-dest.lat,2) + Math.pow(hub.lng-dest.lng,2));
    if (dist > 8 && Math.random() > 0.35) {
      arcs.push({
        startLat: hub.lat + (Math.random()-0.5)*1.5,
        startLng: hub.lng + (Math.random()-0.5)*1.5,
        endLat: dest.lat,
        endLng: dest.lng,
        dist: dist
      });
    }
  });
});

// Hub glow - VERY bright white center
var glowPoints = [];
hubs.forEach(function(h) {
  // Bright white core
  glowPoints.push({lat:h.lat,lng:h.lng,size:0.6,color:'rgba(255,255,255,1)',alt:0.05});
  glowPoints.push({lat:h.lat,lng:h.lng,size:1.0,color:'rgba(255,255,255,0.9)',alt:0.04});
  glowPoints.push({lat:h.lat,lng:h.lng,size:1.5,color:'rgba(255,230,240,0.7)',alt:0.03});
  glowPoints.push({lat:h.lat,lng:h.lng,size:2.2,color:'rgba(255,180,200,0.5)',alt:0.025});
  glowPoints.push({lat:h.lat,lng:h.lng,size:3.0,color:'rgba(255,100,140,0.35)',alt:0.02});
  glowPoints.push({lat:h.lat,lng:h.lng,size:4.0,color:'rgba(255,50,90,0.2)',alt:0.015});
  glowPoints.push({lat:h.lat,lng:h.lng,size:5.5,color:'rgba(255,30,70,0.1)',alt:0.01});
});

var globe = Globe()
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundColor('#000000')
  .showAtmosphere(true)
  .atmosphereColor('#003355')
  .atmosphereAltitude(0.08)
  
  // Many thin arcs
  .arcsData(arcs)
  .arcStartLat('startLat')
  .arcStartLng('startLng')
  .arcEndLat('endLat')
  .arcEndLng('endLng')
  .arcColor(function() {
    return ['rgba(255,200,220,0.7)', 'rgba(255,40,80,0.3)'];
  })
  .arcStroke(0.15) // Thinner
  .arcAltitude(function(d) { return 0.08 + d.dist * 0.0025; })
  .arcDashLength(0.4)
  .arcDashGap(0.08)
  .arcDashAnimateTime(5500)
  
  // Bright hub glows
  .pointsData(glowPoints)
  .pointLat('lat')
  .pointLng('lng')
  .pointRadius('size')
  .pointColor('color')
  .pointAltitude('alt')
  
  (document.getElementById('globe'));

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.06;
globe.pointOfView({lat:30,lng:35,altitude:1.9});

window.onresize = function(){
  globe.width(window.innerWidth);
  globe.height(window.innerHeight);
};
</script>
</body>
</html>
