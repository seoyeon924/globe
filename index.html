<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>GLOBAL MIGRATION</title>
  <script src="https://unpkg.com/globe.gl@2.27.0/dist/globe.gl.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#fff;overflow:hidden}
    #globe{width:100vw;height:100vh;filter:brightness(1.1) contrast(1.1)}
    #ui{position:fixed;top:0;left:0;padding:20px;pointer-events:none;z-index:10;font-family:system-ui,sans-serif}
    .tag{font-size:9px;letter-spacing:.2em;color:#ff2060;text-transform:uppercase;margin-bottom:6px;text-shadow:0 0 20px #ff2060}
    h1{font-size:20px;font-weight:700;color:#fff;text-shadow:0 0 30px rgba(255,100,150,0.8)}
    .sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:4px}
    #legend{margin-top:12px;display:flex;gap:15px;font-size:8px;color:rgba(255,255,255,0.5)}
    .lg{display:flex;align-items:center;gap:5px}
    .lg i{width:8px;height:8px;border-radius:50%}
    .origin{background:#fff;box-shadow:0 0 8px #fff}
    .dest{background:#00ccff;box-shadow:0 0 8px #00ccff}
  </style>
</head>
<body>
<div id="globe"></div>
<div id="ui">
  <div class="tag">Migration Flow 2024</div>
  <h1>GLOBAL MIGRATION</h1>
  <div class="sub">Where refugees go</div>
  <div id="legend">
    <div class="lg"><i class="origin"></i>Origin</div>
    <div class="lg"><i class="dest"></i>Destination</div>
  </div>
</div>
<script>
var hubs = [
  {lat:35.0,lng:38.0,name:'Syria'},
  {lat:10.5,lng:-66.9,name:'Venezuela'},
  {lat:34.5,lng:69.2,name:'Afghanistan'},
  {lat:50.4,lng:30.5,name:'Ukraine'},
  {lat:15.5,lng:32.5,name:'Sudan'},
  {lat:12.0,lng:-1.5,name:'Burkina Faso'},
  {lat:16.0,lng:96.0,name:'Myanmar'},
];

// Fixed destinations with names
var destinations = [
  // Europe (top destinations)
  {lat:52.5,lng:13.4,name:'Germany',count:0},
  {lat:48.9,lng:2.4,name:'France',count:0},
  {lat:51.5,lng:-0.1,name:'UK',count:0},
  {lat:41.9,lng:12.5,name:'Italy',count:0},
  {lat:40.4,lng:-3.7,name:'Spain',count:0},
  {lat:52.2,lng:21.0,name:'Poland',count:0},
  {lat:59.3,lng:18.1,name:'Sweden',count:0},
  {lat:52.4,lng:4.9,name:'Netherlands',count:0},
  {lat:48.2,lng:16.4,name:'Austria',count:0},
  {lat:46.9,lng:7.4,name:'Switzerland',count:0},
  {lat:50.8,lng:4.4,name:'Belgium',count:0},
  {lat:38.7,lng:-9.1,name:'Portugal',count:0},
  {lat:37.98,lng:23.7,name:'Greece',count:0},
  // Middle East
  {lat:41.0,lng:29.0,name:'Turkey',count:0},
  {lat:33.9,lng:35.5,name:'Lebanon',count:0},
  {lat:31.9,lng:35.9,name:'Jordan',count:0},
  {lat:30.0,lng:31.2,name:'Egypt',count:0},
  // Americas
  {lat:40.7,lng:-74.0,name:'USA-NY',count:0},
  {lat:34.1,lng:-118.2,name:'USA-LA',count:0},
  {lat:43.7,lng:-79.4,name:'Canada',count:0},
  {lat:4.6,lng:-74.1,name:'Colombia',count:0},
  {lat:-12.0,lng:-77.0,name:'Peru',count:0},
  {lat:-23.6,lng:-46.6,name:'Brazil',count:0},
  {lat:-33.5,lng:-70.7,name:'Chile',count:0},
  // Asia Pacific
  {lat:-33.9,lng:151.2,name:'Australia',count:0},
  {lat:33.7,lng:73.1,name:'Pakistan',count:0},
  {lat:35.7,lng:51.4,name:'Iran',count:0},
  // Africa
  {lat:0.3,lng:32.6,name:'Uganda',count:0},
  {lat:-1.3,lng:36.8,name:'Kenya',count:0},
  {lat:9.0,lng:38.7,name:'Ethiopia',count:0},
  {lat:-26.2,lng:28.0,name:'South Africa',count:0},
];

// Generate arcs and count destinations
var arcs = [];
hubs.forEach(function(hub) {
  destinations.forEach(function(dest) {
    var dist = Math.sqrt(Math.pow(hub.lat-dest.lat,2) + Math.pow(hub.lng-dest.lng,2));
    if (dist > 5 && Math.random() > 0.3) {
      dest.count++;
      arcs.push({
        startLat: hub.lat + (Math.random()-0.5)*1,
        startLng: hub.lng + (Math.random()-0.5)*1,
        endLat: dest.lat,
        endLng: dest.lng,
        dist: dist
      });
    }
  });
});

// Find max count for normalization
var maxCount = Math.max.apply(null, destinations.map(function(d){return d.count}));

// Create points array
var allPoints = [];

// Hub points (origin - white/red glow)
hubs.forEach(function(h) {
  allPoints.push({lat:h.lat,lng:h.lng,size:0.5,color:'rgba(255,255,255,1)',alt:0.04});
  allPoints.push({lat:h.lat,lng:h.lng,size:0.9,color:'rgba(255,255,255,0.8)',alt:0.035});
  allPoints.push({lat:h.lat,lng:h.lng,size:1.4,color:'rgba(255,200,210,0.6)',alt:0.03});
  allPoints.push({lat:h.lat,lng:h.lng,size:2.0,color:'rgba(255,100,140,0.4)',alt:0.025});
  allPoints.push({lat:h.lat,lng:h.lng,size:3.0,color:'rgba(255,50,80,0.2)',alt:0.02});
});

// Destination points (cyan glow - size based on immigrant count)
destinations.forEach(function(d) {
  if (d.count > 0) {
    var intensity = d.count / maxCount;
    var baseSize = 0.3 + intensity * 1.2;
    
    // Core
    allPoints.push({
      lat:d.lat,lng:d.lng,
      size:baseSize * 0.4,
      color:'rgba(150,255,255,'+(0.7+intensity*0.3)+')',
      alt:0.025
    });
    // Mid glow
    allPoints.push({
      lat:d.lat,lng:d.lng,
      size:baseSize * 0.7,
      color:'rgba(80,220,255,'+(0.4+intensity*0.3)+')',
      alt:0.02
    });
    // Outer glow
    allPoints.push({
      lat:d.lat,lng:d.lng,
      size:baseSize,
      color:'rgba(0,180,255,'+(0.15+intensity*0.2)+')',
      alt:0.015
    });
  }
});

var globe = Globe()
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundColor('#000000')
  .showAtmosphere(true)
  .atmosphereColor('#003355')
  .atmosphereAltitude(0.08)
  
  // Arcs
  .arcsData(arcs)
  .arcStartLat('startLat')
  .arcStartLng('startLng')
  .arcEndLat('endLat')
  .arcEndLng('endLng')
  .arcColor(function() {
    return ['rgba(255,180,200,0.6)', 'rgba(255,40,80,0.25)'];
  })
  .arcStroke(0.12)
  .arcAltitude(function(d) { return 0.06 + d.dist * 0.002; })
  .arcDashLength(0.4)
  .arcDashGap(0.1)
  .arcDashAnimateTime(5000)
  
  // All points (hubs + destinations)
  .pointsData(allPoints)
  .pointLat('lat')
  .pointLng('lng')
  .pointRadius('size')
  .pointColor('color')
  .pointAltitude('alt')
  
  (document.getElementById('globe'));

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.06;
globe.pointOfView({lat:30,lng:20,altitude:2.0});

window.onresize = function(){
  globe.width(window.innerWidth);
  globe.height(window.innerHeight);
};
</script>
</body>
</html>
